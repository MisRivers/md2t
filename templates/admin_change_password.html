{% extends "base.html" %}

{% block title %}修改密码 - md2t{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="mb-0">
                    <i class="bi bi-key me-2"></i>修改密码
                </h3>
                <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-left me-1"></i>返回控制台
                </a>
            </div>

            <div class="card">
                <div class="card-body p-4">
                    <form method="POST" action="{{ url_for('admin_change_password') }}">
                        <div class="mb-3">
                            <label for="old_password" class="form-label">
                                <i class="bi bi-lock me-1"></i>当前密码
                            </label>
                            <input type="password" class="form-control" id="old_password" 
                                   name="old_password" placeholder="请输入当前密码" required autofocus>
                        </div>

                        <div class="mb-3">
                            <label for="new_password" class="form-label">
                                <i class="bi bi-key me-1"></i>新密码
                            </label>
                            <input type="password" class="form-control" id="new_password" 
                                   name="new_password" placeholder="请输入新密码（至少6位）" required minlength="6">
                            <div class="form-text">密码长度不能少于6位</div>
                        </div>

                        <div class="mb-4">
                            <label for="confirm_password" class="form-label">
                                <i class="bi bi-key-fill me-1"></i>确认新密码
                            </label>
                            <input type="password" class="form-control" id="confirm_password" 
                                   name="confirm_password" placeholder="请再次输入新密码" required minlength="6">
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg me-2"></i>确认修改
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="alert alert-warning mt-3 mb-0">
                <i class="bi bi-exclamation-triangle me-2"></i>
                <strong>安全提示：</strong>修改密码后，下次登录需使用新密码。请妥善保管密码。
            </div>
        </div>
    </div>
</div>
{% endblock %}
