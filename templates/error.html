{% extends "base.html" %}

{% block title %}错误 {{ code }} - md2t{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="mb-4">
                <i class="bi bi-exclamation-triangle-fill text-warning" style="font-size: 5rem;"></i>
            </div>
            <h1 class="display-1 fw-bold text-muted">{{ code }}</h1>
            <h3 class="mb-4">{{ message }}</h3>
            <div class="d-flex justify-content-center gap-3">
                <a href="{{ url_for('index') }}" class="btn btn-primary">
                    <i class="bi bi-house me-2"></i>返回首页
                </a>
                <a href="javascript:history.back()" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left me-2"></i>返回上一页
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
